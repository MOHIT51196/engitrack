name: EngiTrack CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - profile

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.5'
  JAVA_VERSION: '17'

jobs:
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          architecture: x64
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        id: format_check
        run: dart format --set-exit-if-changed .

      - name: Run static analysis
        if: success() || steps.format_check.conclusion == 'failure'
        run: flutter analyze --no-pub

      - name: Check for outdated dependencies
        run: flutter pub outdated
        continue-on-error: true

  security:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: analyze
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          architecture: x64
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Audit dependencies for vulnerabilities
        run: |
          dart pub deps --json > deps.json
          echo "## Dependency tree generated"
          head -50 deps.json
        continue-on-error: true

      - name: Check for known advisories
        run: dart pub outdated --json
        continue-on-error: true

      - name: Scan for hardcoded secrets
        uses: trufflesecurity/trufflehog@v3.93.8
        with:
          extra_args: --only-verified
        continue-on-error: true

      - name: Run OSV-Scanner for vulnerability detection
        uses: google/osv-scanner-action/osv-scanner@v2
        with:
          scan-args: --lockfile=pubspec.lock
        continue-on-error: true

  test:
    name: Unit Tests
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: analyze
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          architecture: x64
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests with coverage
        run: flutter test --coverage --reporter=expanded

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 14

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [analyze, security]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          architecture: x64
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/app/build.gradle') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks

      - name: Create key.properties
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOL
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release-keystore.jks
          EOL

      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --build-number=${{ github.run_number }} \
            --dart-define=FLUTTER_BUILD_MODE=release

      - name: Build fat APK (universal)
        run: |
          flutter build apk \
            --release \
            --build-number=${{ github.run_number }} \
            --dart-define=FLUTTER_BUILD_MODE=release

      - name: List build outputs
        run: |
          echo "=== Split APKs ==="
          ls -lh build/app/outputs/flutter-apk/app-*-release.apk 2>/dev/null || echo "No split APKs found"
          echo ""
          echo "=== Universal APK ==="
          ls -lh build/app/outputs/flutter-apk/app-release.apk 2>/dev/null || echo "No universal APK found"

      - name: Upload split APKs
        uses: actions/upload-artifact@v6
        with:
          name: android-apk-split-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30
          if-no-files-found: warn
          compression-level: 0

      - name: Upload universal APK
        uses: actions/upload-artifact@v6
        with:
          name: android-apk-universal-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
          compression-level: 0

      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: android-build-report-${{ github.sha }}
          path: |
            build/app/outputs/logs/
          retention-days: 7
          if-no-files-found: ignore

  build-ios:
    name: Build iOS
    if: false
    runs-on: macos-latest
    timeout-minutes: 45
    needs: [analyze, security]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          architecture: x64
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup iOS signing
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v6
        with:
          name: ios-build-${{ github.sha }}
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

  build-web:
    name: Build Web
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [analyze, security]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          architecture: x64
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web release
        run: |
          flutter build web \
            --release \
            --web-renderer canvaskit \
            --dart-define=FLUTTER_BUILD_MODE=release

      - name: Upload web build
        uses: actions/upload-artifact@v6
        with:
          name: web-build-${{ github.sha }}
          path: build/web/
          retention-days: 30
