name: engitrack

description: EngiTrack - a clean productivity cockpit for software engineers.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.0.0
  flutter_local_notifications: ^19.5.0
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.0.17
  http: ^1.6.0
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  flutter_timezone: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/engitrack_app_icon_1024.png"
  adaptive_icon_background: "#0B1220"
  adaptive_icon_foreground: "assets/branding/engitrack_app_icon_1024.png"
  web:
    generate: true
    image_path: "assets/branding/engitrack_app_icon_1024.png"
    background_color: "#0B1220"
    theme_color: "#0B1220"

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
    - assets/branding/
